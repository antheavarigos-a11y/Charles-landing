<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Charles Intelligence</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #f5f5f5;
    }

    .page {
      min-height: 100vh;
      padding: 48px 64px 32px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .logo {
      width: 44px; /* adjust if you want it larger/smaller */
      height: auto;
      margin-bottom: 96px;
      display: block;
    }

    .eyebrow {
      letter-spacing: 0.22em;
      font-size: 11px;
      text-transform: uppercase;
      color: #0b6c79;
      margin-bottom: 28px;
      font-weight: 500;
    }

    .headline-main {
      font-weight: 700;
      font-size: 68px;
      line-height: 1.06;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .headline-sub {
      font-weight: 700;
      font-size: 68px;
      line-height: 1.06;
      letter-spacing: -0.02em;
      color: #888888; /* grey "Built for Australia." */
      margin-bottom: 40px;
    }

    .body-copy {
      font-size: 16px;
      line-height: 1.6;
      color: #b3b3b3; /* grey paragraph */
      max-width: 560px;
      font-weight: 400;
    }

    .bottom-note {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #666666;
      font-weight: 500;
    }

    .top-block {
      max-width: 760px;
    }

    @media (max-width: 768px) {
      .page {
        padding: 32px 20px 24px;
      }

      .logo {
        margin-bottom: 64px;
        width: 32px;
      }

      .headline-main,
      .headline-sub {
        font-size: 40px;
      }

      .body-copy {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div>
      <img
        src="Charles-Intelligence-Logo.jpg"
        alt="Charles Intelligence logo"
        class="logo"
      />

      <div class="top-block">
        <div class="eyebrow">CHARLES INTELLIGENCE</div>

        <h1 class="headline-main">
          Agentic property<br />
          investment<br />
          intelligence.
        </h1>

        <h2 class="headline-sub">
          Built for Australia.
        </h2>

        <p class="body-copy">
          Property is Australia's most significant asset class. It has never
          had an intelligence layer worthy of it.
        </p>
      </div>
    </div>

    <div class="bottom-note">
      CURRENTLY IN PRIVATE BETA
    </div>
  </div>
</body>
</html>
