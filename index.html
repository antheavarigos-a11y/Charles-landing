<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Charles Intelligence</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Inter from Google Fonts; remove if you self-host -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a; /* dark background */
      color: #f5f5f5;
    }

    .page {
      min-height: 100vh;
      padding: 48px 64px 32px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Logo / mark placeholder using brand teals */
    .logo {
      width: 16px;
      height: 20px;
      background: #1c9197; /* primary teal */
      clip-path: polygon(50% 0, 100% 35%, 80% 100%, 20% 100%, 0 35%);
      margin-bottom: 96px;
    }

    .eyebrow {
      letter-spacing: 0.22em;
      font-size: 11px;
      text-transform: uppercase;
      color: #0b6c79; /* secondary teal */
      margin-bottom: 28px;
      font-weight: 500;
    }

    .headline-main {
      font-weight: 700;
      font-size: 52px;
      line-height: 1.06;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .headline-sub {
      font-weight: 700;
      font-size: 52px;
      line-height: 1.06;
      letter-spacing: -0.02em;
      color: #dbbaa3; /* accent warm beige to separate from main */
      margin-bottom: 40px;
    }

    .body-copy {
      font-size: 16px;
      line-height: 1.6;
      color: #e0e0e0;
      max-width: 520px;
      font-weight: 400;
    }

    .bottom-note {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #888888;
      font-weight: 500;
    }

    /* Example usage of danger red for future states (not visible now) */
    .danger {
      color: #f87171;
    }

    .top-block {
      max-width: 720px;
    }

    @media (max-width: 768px) {
      .page {
        padding: 32px 20px 24px;
      }

      .logo {
        margin-bottom: 64px;
      }

      .headline-main,
      .headline-sub {
        font-size: 34px;
      }

      .body-copy {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div>
      <div class="logo"></div>

      <div class="top-block">
        <div class="eyebrow">CHARLES INTELLIGENCE</div>

        <h1 class="headline-main">
          Agentic property<br />
          investment<br />
          intelligence.
        </h1>

        <h2 class="headline-sub">
          Built for Australia.
        </h2>

        <p class="body-copy">
          Property is Australia's most significant asset class. It has never
          had an intelligence layer worthy of it.
        </p>
      </div>
    </div>

    <div class="bottom-note">
      CURRENTLY IN PRIVATE BETA
    </div>
  </div>
</body>
</html>
