
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Charles Intelligence: Agentic Investment Property Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
              background: '#000000',
              card: '#2e2e2e',
              primary: { DEFAULT: '#1c9197', dark: '#0b6c79' },
              accent: '#dbbaa3',
              danger: '#f87171',
              muted: {
                DEFAULT: '#2d4447',
                hover: '#3c595d',
                border: '#233537',
                text: '#b0c5c9',
                'text-strong': '#e0eaec',
              },
            }
          },
        },
      }
    </script>
    <style>
      :root {
        --primary: #1c9197;
        --background: #000000;
        --card-bg: #2e2e2e;
        --accent: #dbbaa3;
        --text-primary: #ffffff;
        --border: #233537;
      }
      html, body, #root { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background-color: var(--background); color: white; }
      @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
      .animate-fade-in-scale { animation: fadeInScale 0.2s ease-out !important; }
      .report-preview-container { max-height: 65vh; overflow-y: auto; padding: 1rem; background-color: #111; border-radius: 8px; }
    </style>
</head>
  <body>
<div id="root"></div>
  </body>
</html>
